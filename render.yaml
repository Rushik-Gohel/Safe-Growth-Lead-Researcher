services:
  - type: web
    name: safe-growth-api
    runtime: docker
    dockerfilePath: ./deployment/Dockerfile.api
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: API_PORT
        value: 8000
      - key: GOOGLE_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: LANGCHAIN_API_KEY
        sync: false
      - key: LANGCHAIN_TRACING_V2
        value: "true"
      - key: LANGCHAIN_ENDPOINT
        value: https://api.smith.langchain.com
      - key: LANGCHAIN_PROJECT
        value: safe-growth-researcher
      - key: GEMINI_RPM
        value: 15
      - key: GEMINI_TPM
        value: 1000000
      - key: GEMINI_TPD
        value: 1500
      - key: TAVILY_MONTHLY_LIMIT
        value: 1000
      - key: LOG_LEVEL
        value: INFO
      - key: ENABLE_METRICS
        value: "true"
      - key: ENABLE_TRACING
        value: "true"
      - key: MAX_INPUT_LENGTH
        value: 1000
      - key: ENABLE_GUARDRAILS
        value: "true"
      - key: ENABLE_CACHING
        value: "true"
      - key: CACHE_TTL
        value: 3600
      - key: CACHE_MAX_SIZE
        value: 1000
      - key: WORKFLOW_CACHE_TTL
        value: 3600
      - key: LINKEDIN_CACHE_TTL
        value: 3600
      - key: SEARCH_CACHE_TTL
        value: 1800
      - key: COMPANY_NEWS_CACHE_TTL
        value: 3600
      - key: INDUSTRY_TRENDS_CACHE_TTL
        value: 7200
      - key: MAX_RETRIES
        value: 3
      - key: RETRY_DELAY
        value: 2

  - type: web
    name: safe-growth-ui
    runtime: docker
    dockerfilePath: ./deployment/Dockerfile.ui
    plan: starter
    autoDeploy: true
    healthCheckPath: /_stcore/health
    envVars:
      - key: PORT
        value: 8501
      - key: UI_PORT
        value: 8501
      - key: GOOGLE_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: LANGCHAIN_API_KEY
        sync: false
      - key: LANGCHAIN_TRACING_V2
        value: "true"
      - key: LANGCHAIN_ENDPOINT
        value: https://api.smith.langchain.com
      - key: LANGCHAIN_PROJECT
        value: safe-growth-researcher
      - key: GEMINI_RPM
        value: 15
      - key: GEMINI_TPM
        value: 1000000
      - key: GEMINI_TPD
        value: 1500
      - key: TAVILY_MONTHLY_LIMIT
        value: 1000
      - key: LOG_LEVEL
        value: INFO
      - key: ENABLE_METRICS
        value: "true"
      - key: ENABLE_TRACING
        value: "true"
      - key: MAX_INPUT_LENGTH
        value: 1000
      - key: ENABLE_GUARDRAILS
        value: "true"
      - key: ENABLE_CACHING
        value: "true"
      - key: CACHE_TTL
        value: 3600
      - key: CACHE_MAX_SIZE
        value: 1000
      - key: WORKFLOW_CACHE_TTL
        value: 3600
      - key: LINKEDIN_CACHE_TTL
        value: 3600
      - key: SEARCH_CACHE_TTL
        value: 1800
      - key: COMPANY_NEWS_CACHE_TTL
        value: 3600
      - key: INDUSTRY_TRENDS_CACHE_TTL
        value: 7200
      - key: MAX_RETRIES
        value: 3
      - key: RETRY_DELAY
        value: 2
